<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ Văn Hóa - Bản Sắc Việt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .map-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; }
        .map-marker {
            position: absolute; width: 30px; height: 30px;
            background-color: #C62828; color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; cursor: pointer; box-shadow: 0 0 10px rgba(198, 40, 40, 0.5);
            transition: transform 0.3s; z-index: 10;
        }
        .map-marker:hover { transform: scale(1.2); background-color: #b71c1c; }
        .region-list a { display: block; padding: 8px; background: white; margin-bottom: 8px; border-radius: 4px; border: 1px solid #eee; transition: all 0.2s; }
        .region-list a:hover { border-color: #C62828; color: #C62828; padding-left: 12px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <div class="paper-texture"></div>

    <main class="flex-grow container mx-auto px-6 py-10 pt-28">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-cinnabar mb-2">Bản Đồ Văn Hóa & Phương Ngữ</h1>
            <p class="text-gray-600">Click vào các vùng miền để khám phá các dân tộc đặc trưng.</p>
        </div>

        <div class="flex flex-col md:flex-row gap-10 items-start max-w-6xl mx-auto">
            <div class="w-full md:w-2/3 bg-white p-4 rounded-xl shadow-lg border border-gray-200">
                <div class="map-container relative">
                    <img src="../images/ban-do-mau.png" alt="Bản đồ Việt Nam" class="w-full h-auto rounded opacity-90" usemap="#vn-map">
                    <map name="vn-map">
                        <area shape="rect" coords="0,0,200,300" href="#" data-region="north" alt="Miền Bắc">
                        <area shape="rect" coords="0,301,200,600" href="#" data-region="central" alt="Miền Trung">
                        <area shape="rect" coords="0,601,400,900" href="#" data-region="south" alt="Miền Nam">
                    </map>
                    <div class="map-marker" style="top: 20%; left: 45%;" data-region="north">B</div>
                    <div class="map-marker" style="top: 50%; left: 55%;" data-region="central">T</div>
                    <div class="map-marker" style="top: 80%; left: 40%;" data-region="south">N</div>
                </div>
                <p class="text-xs text-center text-gray-400 mt-2 italic">*Click vào các điểm tròn hoặc vùng trên bản đồ</p>
            </div>

            <div class="w-full md:w-1/3">
                <div class="bg-[#FDFBF7] p-6 rounded-xl shadow-lg border-t-4 border-cinnabar sticky top-24">
                    <h3 id="region-title" class="text-2xl font-bold text-gray-800 mb-3">Chọn một vùng</h3>
                    <p id="region-desc" class="text-gray-600 mb-6 text-sm">Thông tin về văn hóa và các dân tộc sẽ hiện tại đây.</p>
                    <h4 class="font-bold text-cinnabar mb-2 text-sm uppercase tracking-wide">Các dân tộc tiêu biểu:</h4>
                    <div id="region-list" class="region-list"><div class="text-gray-400 text-sm italic">Chưa có dữ liệu...</div></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="../js/layout.js"></script>

    <script>
        // Logic bản đồ (Giữ nguyên như cũ)
        const data = {
            north: { title: "Văn Hóa Bắc Bộ", desc: "Cái nôi của văn hóa Việt...", groups: [{ name: "Kinh (Việt)", url: "dan-toc-kinh.html" }, { name: "Tày", url: "#" }, { name: "Mường", url: "#" }, { name: "H'Mông", url: "#" }] },
            central: { title: "Văn Hóa Trung Bộ", desc: "Mảnh đất địa linh nhân kiệt...", groups: [{ name: "Kinh (Huế)", url: "dan-toc-kinh.html" }, { name: "Chăm", url: "#" }, { name: "Cơ Tu", url: "#" }] },
            south: { title: "Văn Hóa Nam Bộ", desc: "Vùng đất hào sảng...", groups: [{ name: "Kinh (Nam Bộ)", url: "dan-toc-kinh.html" }, { name: "Khmer", url: "#" }, { name: "Hoa", url: "#" }] }
        };
        function showRegion(key) {
            const info = data[key]; if(!info) return;
            document.getElementById('region-title').innerText = info.title;
            document.getElementById('region-desc').innerText = info.desc;
            const list = document.getElementById('region-list'); list.innerHTML = '';
            info.groups.forEach(g => {
                const a = document.createElement('a'); a.href = g.url; a.innerText = g.name; a.className = "text-gray-700 font-medium";
                if(g.url === "#") { a.innerHTML += " <span class='text-xs text-gray-400'>(Đang cập nhật)</span>"; a.onclick = (e) => e.preventDefault(); }
                list.appendChild(a);
            });
        }
        document.querySelectorAll('.map-marker').forEach(m => m.addEventListener('click', () => showRegion(m.dataset.region)));
        document.querySelectorAll('area').forEach(a => a.addEventListener('click', (e) => { e.preventDefault(); showRegion(a.dataset.region); }));
    </script>
</body>
</html>
